<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Gremlin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="title" id="host">gremlin</div>
    <div class="live" id="live"><span class="dot"></span><span id="live-label">connecting…</span></div>
    <div class="chip" id="chip" title="copy path">◷ transcript.md</div>
  </header>

  <main id="log" class="log" aria-live="polite"></main>
  <main id="transcript" class="panel" hidden></main>
  <main id="inspect" class="panel" hidden></main>
  <main id="panel" class="panel" hidden></main>

  <footer class="dock">
    <div id="cmd-menu" class="cmd-menu" role="listbox" aria-label="Slash commands" hidden></div>
    <form id="composer" class="composer" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Message…" aria-label="Message"></textarea>
      <button id="send" type="submit" aria-label="Send">⮕</button>
    </form>
    <nav class="tabbar" aria-label="Sections">
      <button class="tab active" data-view="chat" aria-current="page">💬<span>Chat</span></button>
      <button class="tab" data-view="transcript">📝<span>Transcript</span></button>
      <button class="tab" data-view="inspect">🔎<span>Inspect</span></button>
      <button class="tab" data-view="more">⋯<span>More</span></button>
    </nav>
  </footer>

  <script src="/render.js"></script>
  <script src="/app.js"></script>
</body>
</html>
