<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Gremlin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="title">Gremlin</div>
    <div class="live" id="live"><span class="dot"></span><span id="live-label">connecting…</span></div>
    <div class="chip" id="chip" title="copy path">◷ transcript.md</div>
  </header>

  <main id="log" class="log" aria-live="polite"></main>

  <form id="composer" class="composer" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Message…" aria-label="Message"></textarea>
    <button id="send" type="submit" aria-label="Send">⮕</button>
  </form>

  <script src="/app.js"></script>
</body>
</html>
